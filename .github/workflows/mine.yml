name: Mine Show Ideas

on:
  schedule:
    # 11:00 UTC daily = 7:00 AM Eastern (6:00 AM during standard time)
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button for testing

permissions:
  contents: write         # allows the Action to commit results back to the repo

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run the miner
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/mine_ideas.py

      - name: Commit results
        run: |
          git config user.name "idea-miner-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new ideas this run, nothing to commit."
          else
            git commit -m "Daily idea mining run: $(date -u +%Y-%m-%d)"
            git push
          fi
